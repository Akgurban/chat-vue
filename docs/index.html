<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat-Go</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        padding: 20px;
        background: #f5f5f5;
      }
      .hidden {
        display: none !important;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      .section {
        background: white;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 8px;
      }
      h1,
      h2,
      h3 {
        margin-top: 0;
      }
      input,
      button,
      textarea,
      select {
        padding: 8px 12px;
        margin: 4px;
        font-size: 14px;
      }
      input,
      textarea,
      select {
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
      button.danger {
        background: #dc3545;
      }
      button.success {
        background: #28a745;
      }
      .flex {
        display: flex;
        gap: 20px;
      }
      .flex-1 {
        flex: 1;
      }
      .messages {
        height: 300px;
        overflow-y: auto;
        border: 1px solid #ccc;
        padding: 10px;
        margin: 10px 0;
        background: #fafafa;
      }
      .message {
        padding: 8px;
        margin: 4px 0;
        background: #e9ecef;
        border-radius: 4px;
      }
      .message.mine {
        background: #007bff;
        color: white;
        margin-left: 20%;
      }
      .message .meta {
        font-size: 12px;
        opacity: 0.7;
      }
      .users-list,
      .rooms-list {
        max-height: 200px;
        overflow-y: auto;
      }
      .user-item,
      .room-item {
        padding: 8px;
        border-bottom: 1px solid #eee;
        cursor: pointer;
      }
      .user-item:hover,
      .room-item:hover {
        background: #f0f0f0;
      }
      .status {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 8px;
      }
      .status.online {
        background: #28a745;
      }
      .status.offline {
        background: #ccc;
      }
      #connection-status {
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 4px;
      }
      #connection-status.connected {
        background: #d4edda;
        color: #155724;
      }
      #connection-status.disconnected {
        background: #f8d7da;
        color: #721c24;
      }
      .typing-indicator {
        font-style: italic;
        color: #666;
        font-size: 12px;
      }
      #error-message {
        background: #f8d7da;
        color: #721c24;
        padding: 10px;
        margin: 10px 0;
        border-radius: 4px;
      }
      #success-message {
        background: #d4edda;
        color: #155724;
        padding: 10px;
        margin: 10px 0;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🗨️ Chat-Go</h1>

      <!-- Auth Section -->
      <div id="auth-section" class="section">
        <h2>Authentication</h2>
        <div class="flex">
          <div class="flex-1">
            <h3>Register</h3>
            <form id="register-form">
              <input
                type="text"
                id="reg-username"
                placeholder="Username"
                required
              /><br />
              <input
                type="email"
                id="reg-email"
                placeholder="Email"
                required
              /><br />
              <input
                type="password"
                id="reg-password"
                placeholder="Password"
                required
              /><br />
              <button type="submit">Register</button>
            </form>
          </div>
          <div class="flex-1">
            <h3>Login</h3>
            <form id="login-form">
              <input
                type="email"
                id="login-email"
                placeholder="Email"
                required
              /><br />
              <input
                type="password"
                id="login-password"
                placeholder="Password"
                required
              /><br />
              <button type="submit">Login</button>
            </form>
          </div>
        </div>
        <div id="error-message" class="hidden"></div>
        <div id="success-message" class="hidden"></div>
      </div>

      <!-- Main Chat Section (hidden until logged in) -->
      <div id="chat-section" class="hidden">
        <div id="connection-status" class="disconnected">⚫ Disconnected</div>

        <div class="section">
          <div class="flex">
            <span>Logged in as: <strong id="current-user"></strong></span>
            <button onclick="logout()" class="danger">Logout</button>
          </div>
        </div>

        <div class="flex">
          <!-- Left Panel: Users & Rooms -->
          <div style="width: 300px">
            <!-- Users List -->
            <div class="section">
              <h3>👥 Users</h3>
              <button onclick="loadUsers()">Refresh</button>
              <div id="users-list" class="users-list"></div>
            </div>

            <!-- Rooms List -->
            <div class="section">
              <h3>🏠 Rooms</h3>
              <button onclick="loadRooms()">Refresh</button>
              <button onclick="showCreateRoom()">+ New Room</button>
              <div id="rooms-list" class="rooms-list"></div>
            </div>

            <!-- My Rooms -->
            <div class="section">
              <h3>📌 My Rooms</h3>
              <button onclick="loadMyRooms()">Refresh</button>
              <div id="my-rooms-list" class="rooms-list"></div>
            </div>
          </div>

          <!-- Right Panel: Chat Area -->
          <div class="flex-1">
            <!-- Create Room Form -->
            <div id="create-room-section" class="section hidden">
              <h3>Create New Room</h3>
              <form id="create-room-form">
                <input
                  type="text"
                  id="room-name"
                  placeholder="Room Name"
                  required
                />
                <input
                  type="text"
                  id="room-description"
                  placeholder="Description"
                />
                <label
                  ><input type="checkbox" id="room-private" /> Private</label
                >
                <button type="submit">Create</button>
                <button type="button" onclick="hideCreateRoom()">Cancel</button>
              </form>
            </div>

            <!-- Room Chat -->
            <div id="room-chat-section" class="section hidden">
              <h3>🏠 Room: <span id="current-room-name"></span></h3>
              <div>
                <button onclick="leaveCurrentRoom()" class="danger">
                  Leave Room
                </button>
                <button onclick="loadRoomMembers()">Show Members</button>
              </div>
              <div
                id="room-members"
                class="hidden"
                style="padding: 10px; background: #f0f0f0; margin: 10px 0"
              ></div>
              <div id="room-messages" class="messages"></div>
              <div id="room-typing" class="typing-indicator"></div>
              <form id="room-message-form">
                <input
                  type="text"
                  id="room-message-input"
                  placeholder="Type a message..."
                  style="width: 70%"
                />
                <button type="submit">Send</button>
              </form>
            </div>

            <!-- Direct Messages -->
            <div id="dm-chat-section" class="section hidden">
              <h3>💬 Chat with: <span id="dm-username"></span></h3>
              <div id="dm-messages" class="messages"></div>
              <form id="dm-message-form">
                <input
                  type="text"
                  id="dm-message-input"
                  placeholder="Type a message..."
                  style="width: 70%"
                />
                <button type="submit">Send</button>
              </form>
            </div>

            <!-- Default View -->
            <div id="default-view" class="section">
              <h3>Welcome!</h3>
              <p>
                Select a user to start a direct message, or join/create a room
                to chat.
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Configuration
      const API_URL = "http://localhost:8080";
      const WS_URL = "ws://localhost:8080/ws";

      // State
      let token = localStorage.getItem("token");
      let currentUser = JSON.parse(localStorage.getItem("user") || "null");
      let ws = null;
      let currentRoomId = null;
      let currentDmUserId = null;
      let typingTimeout = null;

      // Initialize
      document.addEventListener("DOMContentLoaded", () => {
        if (token && currentUser) {
          showChatSection();
          connectWebSocket();
          loadUsers();
          loadRooms();
          loadMyRooms();
        }
        setupEventListeners();
      });

      function setupEventListeners() {
        document
          .getElementById("register-form")
          .addEventListener("submit", handleRegister);
        document
          .getElementById("login-form")
          .addEventListener("submit", handleLogin);
        document
          .getElementById("create-room-form")
          .addEventListener("submit", handleCreateRoom);
        document
          .getElementById("room-message-form")
          .addEventListener("submit", handleSendRoomMessage);
        document
          .getElementById("dm-message-form")
          .addEventListener("submit", handleSendDM);

        // Typing indicator
        document
          .getElementById("room-message-input")
          .addEventListener("input", handleTyping);
      }

      // API Helper
      async function api(endpoint, options = {}) {
        const headers = { "Content-Type": "application/json" };
        if (token) headers["Authorization"] = `Bearer ${token}`;

        const res = await fetch(`${API_URL}${endpoint}`, {
          ...options,
          headers: { ...headers, ...options.headers },
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Request failed");
        return data;
      }

      // Show/Hide helpers
      function showError(msg) {
        const el = document.getElementById("error-message");
        el.textContent = msg;
        el.classList.remove("hidden");
        setTimeout(() => el.classList.add("hidden"), 5000);
      }

      function showSuccess(msg) {
        const el = document.getElementById("success-message");
        el.textContent = msg;
        el.classList.remove("hidden");
        setTimeout(() => el.classList.add("hidden"), 3000);
      }

      function showChatSection() {
        document.getElementById("auth-section").classList.add("hidden");
        document.getElementById("chat-section").classList.remove("hidden");
        document.getElementById("current-user").textContent =
          currentUser.username;
      }

      function showAuthSection() {
        document.getElementById("auth-section").classList.remove("hidden");
        document.getElementById("chat-section").classList.add("hidden");
      }

      // Auth
      async function handleRegister(e) {
        e.preventDefault();
        try {
          const data = await api("/api/auth/register", {
            method: "POST",
            body: JSON.stringify({
              username: document.getElementById("reg-username").value,
              email: document.getElementById("reg-email").value,
              password: document.getElementById("reg-password").value,
            }),
          });
          token = data.token;
          currentUser = data.user;
          localStorage.setItem("token", token);
          localStorage.setItem("user", JSON.stringify(currentUser));
          showSuccess("Registered successfully!");
          showChatSection();
          connectWebSocket();
          loadUsers();
          loadRooms();
          loadMyRooms();
        } catch (err) {
          showError(err.message);
        }
      }

      async function handleLogin(e) {
        e.preventDefault();
        try {
          const data = await api("/api/auth/login", {
            method: "POST",
            body: JSON.stringify({
              email: document.getElementById("login-email").value,
              password: document.getElementById("login-password").value,
            }),
          });
          token = data.token;
          currentUser = data.user;
          localStorage.setItem("token", token);
          localStorage.setItem("user", JSON.stringify(currentUser));
          showSuccess("Logged in successfully!");
          showChatSection();
          connectWebSocket();
          loadUsers();
          loadRooms();
          loadMyRooms();
        } catch (err) {
          showError(err.message);
        }
      }

      function logout() {
        token = null;
        currentUser = null;
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        if (ws) ws.close();
        showAuthSection();
      }

      // WebSocket
      function connectWebSocket() {
        ws = new WebSocket(`${WS_URL}?token=${token}`);

        ws.onopen = () => {
          console.log("WebSocket connected");
          document.getElementById("connection-status").className = "connected";
          document.getElementById("connection-status").textContent =
            "🟢 Connected";
        };

        ws.onclose = () => {
          console.log("WebSocket disconnected");
          document.getElementById("connection-status").className =
            "disconnected";
          document.getElementById("connection-status").textContent =
            "⚫ Disconnected";
          // Reconnect after 3 seconds
          setTimeout(() => {
            if (token) connectWebSocket();
          }, 3000);
        };

        ws.onerror = (err) => {
          console.error("WebSocket error:", err);
        };

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          handleWebSocketMessage(msg);
        };
      }

      function handleWebSocketMessage(msg) {
        console.log("WS message:", msg);

        switch (msg.type) {
          case "new_message":
            if (currentRoomId === msg.payload.room_id) {
              appendRoomMessage(msg.payload);
            }
            break;

          case "new_direct_message":
            if (
              currentDmUserId === msg.payload.sender_id ||
              currentDmUserId === msg.payload.receiver_id
            ) {
              appendDMMessage(msg.payload);
            }
            break;

          case "user_joined":
            if (currentRoomId === msg.payload.room_id) {
              appendSystemMessage(`${msg.payload.username} joined the room`);
            }
            break;

          case "user_left":
            if (currentRoomId === msg.payload.room_id) {
              appendSystemMessage(`${msg.payload.username} left the room`);
            }
            break;

          case "user_typing":
            if (
              currentRoomId === msg.payload.room_id &&
              msg.payload.user_id !== currentUser.id
            ) {
              showTypingIndicator(msg.payload.username);
            }
            break;
        }
      }

      function wsSend(type, payload) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type, payload }));
        }
      }

      // Users
      async function loadUsers() {
        try {
          const users = await api("/api/users");
          const list = document.getElementById("users-list");
          list.innerHTML = users
            .map(
              (u) => `
                    <div class="user-item" onclick="openDM(${u.id}, '${u.username}')">
                        <span class="status ${u.status}"></span>
                        ${u.username} ${u.id === currentUser.id ? "(you)" : ""}
                    </div>
                `,
            )
            .join("");
        } catch (err) {
          console.error("Failed to load users:", err);
        }
      }

      // Rooms
      async function loadRooms() {
        try {
          const rooms = await api("/api/rooms");
          const list = document.getElementById("rooms-list");
          list.innerHTML = rooms.length
            ? rooms
                .map(
                  (r) => `
                    <div class="room-item" onclick="joinRoom(${r.id}, '${r.name}')">
                        ${r.is_private ? "🔒" : "🌐"} ${r.name}
                    </div>
                `,
                )
                .join("")
            : "<p>No public rooms</p>";
        } catch (err) {
          console.error("Failed to load rooms:", err);
        }
      }

      async function loadMyRooms() {
        try {
          const rooms = await api("/api/rooms/my");
          const list = document.getElementById("my-rooms-list");
          list.innerHTML = rooms.length
            ? rooms
                .map(
                  (r) => `
                    <div class="room-item" onclick="openRoom(${r.id}, '${r.name}')">
                        ${r.is_private ? "🔒" : "🌐"} ${r.name}
                    </div>
                `,
                )
                .join("")
            : "<p>No rooms joined</p>";
        } catch (err) {
          console.error("Failed to load my rooms:", err);
        }
      }

      function showCreateRoom() {
        document
          .getElementById("create-room-section")
          .classList.remove("hidden");
      }

      function hideCreateRoom() {
        document.getElementById("create-room-section").classList.add("hidden");
      }

      async function handleCreateRoom(e) {
        e.preventDefault();
        try {
          const room = await api("/api/rooms", {
            method: "POST",
            body: JSON.stringify({
              name: document.getElementById("room-name").value,
              description: document.getElementById("room-description").value,
              is_private: document.getElementById("room-private").checked,
            }),
          });
          showSuccess("Room created!");
          hideCreateRoom();
          loadRooms();
          loadMyRooms();
          openRoom(room.id, room.name);
        } catch (err) {
          showError(err.message);
        }
      }

      async function joinRoom(roomId, roomName) {
        try {
          await api(`/api/rooms/${roomId}/join`, { method: "POST" });
          showSuccess("Joined room!");
          loadMyRooms();
          openRoom(roomId, roomName);
        } catch (err) {
          // Already a member, just open it
          openRoom(roomId, roomName);
        }
      }

      async function openRoom(roomId, roomName) {
        // Leave previous room if any
        if (currentRoomId) {
          wsSend("leave_room", { room_id: currentRoomId });
        }

        currentRoomId = roomId;
        currentDmUserId = null;

        // Show room chat section
        document.getElementById("default-view").classList.add("hidden");
        document.getElementById("dm-chat-section").classList.add("hidden");
        document.getElementById("room-chat-section").classList.remove("hidden");
        document.getElementById("current-room-name").textContent = roomName;
        document.getElementById("room-members").classList.add("hidden");

        // Join room via WebSocket
        wsSend("join_room", { room_id: roomId });

        // Load messages
        try {
          const messages = await api(`/api/rooms/${roomId}/messages`);
          const container = document.getElementById("room-messages");
          container.innerHTML = messages
            .map((m) => formatRoomMessage(m))
            .join("");
          container.scrollTop = container.scrollHeight;
        } catch (err) {
          console.error("Failed to load messages:", err);
        }
      }

      async function leaveCurrentRoom() {
        if (!currentRoomId) return;
        try {
          await api(`/api/rooms/${currentRoomId}/leave`, { method: "POST" });
          wsSend("leave_room", { room_id: currentRoomId });
          currentRoomId = null;
          document.getElementById("room-chat-section").classList.add("hidden");
          document.getElementById("default-view").classList.remove("hidden");
          loadMyRooms();
          showSuccess("Left room");
        } catch (err) {
          showError(err.message);
        }
      }

      async function loadRoomMembers() {
        if (!currentRoomId) return;
        try {
          const room = await api(`/api/rooms/${currentRoomId}`);
          const membersDiv = document.getElementById("room-members");
          membersDiv.innerHTML =
            "<strong>Members:</strong> " +
            room.members
              .map(
                (m) => `<span class="status ${m.status}"></span>${m.username}`,
              )
              .join(", ");
          membersDiv.classList.toggle("hidden");
        } catch (err) {
          console.error("Failed to load members:", err);
        }
      }

      function formatRoomMessage(m) {
        const isMine = m.sender_id === currentUser.id;
        const time = new Date(m.created_at).toLocaleTimeString();
        return `
                <div class="message ${isMine ? "mine" : ""}">
                    <div class="meta">${m.sender_username} • ${time}</div>
                    <div>${escapeHtml(m.content)}</div>
                </div>
            `;
      }

      function appendRoomMessage(m) {
        const container = document.getElementById("room-messages");
        container.innerHTML += formatRoomMessage(m);
        container.scrollTop = container.scrollHeight;
      }

      function appendSystemMessage(text) {
        const container = document.getElementById("room-messages");
        container.innerHTML += `<div class="message" style="background:#fff3cd;text-align:center;font-style:italic;">${text}</div>`;
        container.scrollTop = container.scrollHeight;
      }

      async function handleSendRoomMessage(e) {
        e.preventDefault();
        const input = document.getElementById("room-message-input");
        const content = input.value.trim();
        if (!content || !currentRoomId) return;

        wsSend("chat_message", { room_id: currentRoomId, content });
        input.value = "";
      }

      function handleTyping() {
        if (!currentRoomId) return;
        clearTimeout(typingTimeout);
        wsSend("typing", { room_id: currentRoomId });
      }

      function showTypingIndicator(username) {
        const el = document.getElementById("room-typing");
        el.textContent = `${username} is typing...`;
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          el.textContent = "";
        }, 2000);
      }

      // Direct Messages
      async function openDM(userId, username) {
        if (userId === currentUser.id) return;

        // Leave room if any
        if (currentRoomId) {
          wsSend("leave_room", { room_id: currentRoomId });
          currentRoomId = null;
        }

        currentDmUserId = userId;

        // Show DM section
        document.getElementById("default-view").classList.add("hidden");
        document.getElementById("room-chat-section").classList.add("hidden");
        document.getElementById("dm-chat-section").classList.remove("hidden");
        document.getElementById("dm-username").textContent = username;

        // Load messages
        try {
          const messages = await api(`/api/dm/${userId}`);
          const container = document.getElementById("dm-messages");
          container.innerHTML = messages
            .map((m) => formatDMMessage(m))
            .join("");
          container.scrollTop = container.scrollHeight;
        } catch (err) {
          console.error("Failed to load DMs:", err);
        }
      }

      function formatDMMessage(m) {
        const isMine = m.sender_id === currentUser.id;
        const time = new Date(m.created_at).toLocaleTimeString();
        return `
                <div class="message ${isMine ? "mine" : ""}">
                    <div class="meta">${m.sender_username} • ${time}</div>
                    <div>${escapeHtml(m.content)}</div>
                </div>
            `;
      }

      function appendDMMessage(m) {
        const container = document.getElementById("dm-messages");
        container.innerHTML += formatDMMessage(m);
        container.scrollTop = container.scrollHeight;
      }

      async function handleSendDM(e) {
        e.preventDefault();
        const input = document.getElementById("dm-message-input");
        const content = input.value.trim();
        if (!content || !currentDmUserId) return;

        wsSend("direct_message", { receiver_id: currentDmUserId, content });
        input.value = "";
      }

      // Utility
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }
    </script>
  </body>
</html>
